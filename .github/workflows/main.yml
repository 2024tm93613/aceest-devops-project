name: ACEest CI Pipeline

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ✅ optional but recommended
      

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4   # ✅ updated

      - name: Setup Python
        uses: actions/setup-python@v5   # ✅ updated
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: pytest

      - name: Build Docker Image
        run: docker build -t aceest-app .